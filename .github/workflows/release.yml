name: Release

# Builds wheels for all platforms and publishes to PyPI via Trusted
# Publishing (no API tokens). Triggered by pushing a v* tag; see
# docs/release.md for the runbook.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            smoke: true
          - os: ubuntu-latest
            target: aarch64
            smoke: false # cross-compiled; can't run on the x86_64 runner
          - os: macos-14
            target: universal2-apple-darwin
            smoke: true
          - os: windows-latest
            target: x64
            smoke: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - name: Smoke test
        if: matrix.smoke
        shell: bash
        run: |
          pip install --no-index --find-links python/dist setreplace
          python -c "
          import setreplace as sr
          s = sr.evolve('{{x, y}} -> {{x, y}, {y, z}}', [[1, 1]], generations=5)
          assert s.events_count == 31 and len(s.final_state) == 32
          assert s.plot().svg.startswith('<svg')
          print('smoke ok:', repr(s))
          "
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist

  publish:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
